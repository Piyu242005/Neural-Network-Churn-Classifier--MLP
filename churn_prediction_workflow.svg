<svg width="100%" viewBox="0 0 800 1020" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050814"/>
      <stop offset="100%" stop-color="#0B1121"/>
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1.5" fill="#1E293B"/>
    </pattern>

    <!-- Card Backgrounds -->
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#090E17" stop-opacity="0.95"/>
    </linearGradient>

    <linearGradient id="modelCardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1B4B" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0B091E" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Glow Effects -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="modelGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#6366F1" flood-opacity="0.4"/>
    </filter>
    <filter id="businessGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#10B981" flood-opacity="0.4"/>
    </filter>

    <!-- Line Gradients -->
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>

    <!-- Arrow Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowBranch" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background Layer -->
  <rect width="800" height="1020" rx="20" fill="url(#bgGlow)"/>
  <rect width="800" height="1020" rx="20" fill="url(#grid)"/>

  <!-- Top Accent Line -->
  <rect width="800" height="4" rx="2" fill="url(#modelCardBg)"/>

  <!-- Diagram Title -->
  <g text-anchor="middle">
    <text x="400" y="60" font-size="22" font-weight="700" fill="#F8FAFC" letter-spacing="2">CHURN PREDICTION PIPELINE</text>
    <path d="M 360 75 L 440 75" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- ==========================================
       CONNECTION LINES (Drawn first so boxes overlap them)
       ========================================== -->
  <g stroke="#64748B" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main Vertical Path -->
    <path d="M400,180 L400,225" marker-end="url(#arrow)"/>
    <path d="M400,290 L400,335" marker-end="url(#arrow)"/>
    <path d="M400,400 L400,445" marker-end="url(#arrow)"/>
    <path d="M400,530 L400,565" marker-end="url(#arrow)"/>
    <path d="M400,640 L400,675" marker-end="url(#arrow)"/>
    
    <!-- SHAP to Branch Point -->
    <path d="M400,750 L400,780"/>
    <!-- Branch Point to Deployments -->
    <path d="M400,780 L160,780 L160,795" marker-end="url(#arrowBranch)" stroke="#475569"/>
    <path d="M400,780 L400,795" marker-end="url(#arrowBranch)" stroke="#475569"/>
    <path d="M400,780 L640,780 L640,795" marker-end="url(#arrowBranch)" stroke="#475569"/>

    <!-- Deployments to Business Branch Point -->
    <path d="M160,870 L160,890 L400,890" stroke="#475569"/>
    <path d="M400,870 L400,890" stroke="#475569"/>
    <path d="M640,870 L640,890 L400,890" stroke="#475569"/>
    <!-- Branch Point to Business Box -->
    <path d="M400,890 L400,905" marker-end="url(#arrow)" stroke="#10B981"/>
  </g>

  <!-- ==========================================
       NODES / CARDS
       ========================================== -->

  <!-- STEP 1: Raw Data -->
  <g transform="translate(220, 110)">
    <rect width="360" height="70" rx="12" fill="url(#cardBg)" filter="url(#shadow)" stroke="#334155" stroke-width="1.5"/>
    <!-- Icon -->
    <rect x="20" y="15" width="40" height="40" rx="8" fill="#1E293B"/>
    <path d="M30 25 h20 M30 31 h20 M30 37 h12" stroke="#38BDF8" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Text -->
    <text x="80" y="32" font-size="16" font-weight="600" fill="#F8FAFC">Raw Transactional Data</text>
    <text x="80" y="52" font-size="13" fill="#94A3B8">10,000 customer records (CSV)</text>
  </g>

  <!-- STEP 2: Feature Engineering -->
  <g transform="translate(220, 230)">
    <rect width="360" height="70" rx="12" fill="url(#cardBg)" filter="url(#shadow)" stroke="#334155" stroke-width="1.5"/>
    <rect x="20" y="15" width="40" height="40" rx="8" fill="#1E293B"/>
    <path d="M36 22 L44 35 L28 35 Z M32 38 h16 v10 h-16 Z" fill="none" stroke="#2DD4BF" stroke-width="2" stroke-linejoin="round"/>
    <text x="80" y="32" font-size="16" font-weight="600" fill="#F8FAFC">Feature Engineering</text>
    <text x="80" y="52" font-size="13" fill="#94A3B8">16 features: recency, frequency, profit...</text>
  </g>

  <!-- STEP 3: Preprocessing -->
  <g transform="translate(220, 340)">
    <rect width="360" height="70" rx="12" fill="url(#cardBg)" filter="url(#shadow)" stroke="#334155" stroke-width="1.5"/>
    <rect x="20" y="15" width="40" height="40" rx="8" fill="#1E293B"/>
    <path d="M28 25 A10 10 0 1 1 52 25 M28 45 A10 10 0 1 0 52 45" fill="none" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round"/>
    <text x="80" y="32" font-size="16" font-weight="600" fill="#F8FAFC">Preprocessing Pipeline</text>
    <text x="80" y="52" font-size="13" fill="#94A3B8">Scale, Encode, SMOTE, Split (80/20)</text>
  </g>

  <!-- STEP 4: MLP Model (Highlighted & Glowing) -->
  <g transform="translate(200, 450)">
    <rect width="400" height="80" rx="16" fill="url(#modelCardBg)" filter="url(#modelGlow)" stroke="#6366F1" stroke-width="2"/>
    <rect x="25" y="20" width="40" height="40" rx="8" fill="#312E81"/>
    <!-- Neural Net Icon -->
    <g fill="#A5B4FC">
      <circle cx="35" cy="30" r="3"/> <circle cx="35" cy="50" r="3"/>
      <circle cx="45" cy="40" r="3"/>
      <circle cx="55" cy="25" r="3"/> <circle cx="55" cy="40" r="3"/> <circle cx="55" cy="55" r="3"/>
    </g>
    <path d="M 38 30 L 42 40 M 38 50 L 42 40 M 48 40 L 52 25 M 48 40 L 52 40 M 48 40 L 52 55" stroke="#6366F1" stroke-width="1.5" opacity="0.6"/>
    
    <text x="85" y="36" font-size="17" font-weight="700" fill="#E0E7FF">PyTorch MLP Classifier</text>
    <text x="85" y="58" font-size="13" fill="#A5B4FC">128→64→32 neurons · 100 Epochs · Adam</text>
  </g>

  <!-- STEP 5: Evaluation -->
  <g transform="translate(220, 570)">
    <rect width="360" height="70" rx="12" fill="url(#cardBg)" filter="url(#shadow)" stroke="#334155" stroke-width="1.5"/>
    <rect x="20" y="15" width="40" height="40" rx="8" fill="#1E293B"/>
    <path d="M28 40 L34 32 L40 36 L52 24 M52 24 L46 24 M52 24 L52 30" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="80" y="32" font-size="16" font-weight="600" fill="#F8FAFC">Performance Evaluation</text>
    <text x="80" y="52" font-size="13" fill="#94A3B8">98.4% Acc · 0.999 ROC-AUC · Baselines</text>
  </g>

  <!-- STEP 6: SHAP -->
  <g transform="translate(220, 680)">
    <rect width="360" height="70" rx="12" fill="url(#cardBg)" filter="url(#shadow)" stroke="#334155" stroke-width="1.5"/>
    <rect x="20" y="15" width="40" height="40" rx="8" fill="#1E293B"/>
    <path d="M28 27 h24 M28 35 h16 M28 43 h8" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
    <text x="80" y="32" font-size="16" font-weight="600" fill="#F8FAFC">SHAP Explainability</text>
    <text x="80" y="52" font-size="13" fill="#94A3B8">Feature importance per customer prediction</text>
  </g>

  <!-- Deployment Label -->
  <text x="400" y="770" text-anchor="middle" font-size="12" font-weight="600" fill="#64748B" letter-spacing="1.5">DEPLOYMENT STRATEGY</text>

  <!-- STEP 7: DEPLOYMENT BOXES -->
  
  <!-- Flask API -->
  <g transform="translate(60, 800)">
    <rect width="200" height="70" rx="10" fill="url(#cardBg)" filter="url(#shadow)" stroke="#475569" stroke-width="1"/>
    <rect x="15" y="15" width="30" height="30" rx="6" fill="#1E293B"/>
    <path d="M25 25 h10 v5 h-10 Z M27 30 v8 M28 38 h6" fill="none" stroke="#EC4899" stroke-width="1.5" stroke-linejoin="round"/>
    <text x="55" y="30" font-size="14" font-weight="600" fill="#F1F5F9">Flask REST API</text>
    <text x="55" y="48" font-size="12" fill="#94A3B8">Real-time inference</text>
  </g>

  <!-- Streamlit -->
  <g transform="translate(300, 800)">
    <rect width="200" height="70" rx="10" fill="url(#cardBg)" filter="url(#shadow)" stroke="#475569" stroke-width="1"/>
    <rect x="15" y="15" width="30" height="30" rx="6" fill="#1E293B"/>
    <path d="M22 25 h16 M22 30 h12 M22 35 h8" stroke="#EC4899" stroke-width="1.5" stroke-linecap="round"/>
    <text x="55" y="30" font-size="14" font-weight="600" fill="#F1F5F9">Streamlit UI</text>
    <text x="55" y="48" font-size="12" fill="#94A3B8">Interactive dashboard</text>
  </g>

  <!-- Docker -->
  <g transform="translate(540, 800)">
    <rect width="200" height="70" rx="10" fill="url(#cardBg)" filter="url(#shadow)" stroke="#475569" stroke-width="1"/>
    <rect x="15" y="15" width="30" height="30" rx="6" fill="#1E293B"/>
    <path d="M22 26 h16 M22 30 h16 M22 34 h16 M26 22 v16 M34 22 v16" stroke="#EC4899" stroke-width="1.5" stroke-linecap="round"/>
    <text x="55" y="30" font-size="14" font-weight="600" fill="#F1F5F9">Docker Ready</text>
    <text x="55" y="48" font-size="12" fill="#94A3B8">Cloud containerized</text>
  </g>

  <!-- STEP 8: Business Impact (Glowing Green) -->
  <g transform="translate(180, 910)">
    <rect width="440" height="60" rx="14" fill="#064E3B" filter="url(#businessGlow)" stroke="#10B981" stroke-width="2"/>
    <rect x="20" y="15" width="30" height="30" rx="6" fill="#022C22"/>
    <path d="M 28 30 L 32 34 L 42 24" fill="none" stroke="#34D399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="65" y="35" font-size="16" font-weight="700" fill="#A7F3D0" letter-spacing="0.5">BUSINESS ACTION: Retain High-Risk Customers</text>
  </g>

</svg>