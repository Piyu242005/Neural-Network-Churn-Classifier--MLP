<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="600" fill="#0A0A0A" rx="20"/>
  
  <!-- Definitions for gradients and shadows -->
  <defs>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF66;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#00FF66;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7000FF;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#7000FF;stop-opacity:0.05" />
    </linearGradient>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="600" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Customer Churn Prediction &amp; Action System Workflow</text>

  <!-- Connectors -->
  <g stroke="#333333" stroke-width="2" fill="none">
    <path d="M220 300 L280 300" />
    <path d="M480 300 L540 300" />
    <path d="M740 300 L800 300" />
    <path d="M1000 300 L1060 300" />
  </g>

  <!-- Step 1: Data Layer -->
  <g transform="translate(40, 100)">
    <rect width="180" height="400" fill="url(#grad-green)" stroke="#00FF66" stroke-width="1" rx="15" />
    <text x="90" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#00FF66" text-anchor="middle">Data Layer</text>
    <g transform="translate(20, 60)">
      <rect width="140" height="60" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" rx="8" />
      <text x="70" y="35" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Raw Data</text>
    </g>
    <g transform="translate(20, 140)">
      <rect width="140" height="60" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" rx="8" />
      <text x="70" y="35" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Cleaning</text>
    </g>
    <g transform="translate(20, 220)">
      <rect width="140" height="60" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" rx="8" />
      <text x="70" y="35" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Feature Eng.</text>
    </g>
    <g transform="translate(20, 300)">
      <rect width="140" height="60" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" rx="8" />
      <text x="70" y="35" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Encoding</text>
    </g>
  </g>

  <!-- Step 2: Model Layer -->
  <g transform="translate(300, 100)">
    <rect width="180" height="400" fill="url(#grad-purple)" stroke="#7000FF" stroke-width="1" rx="15" />
    <text x="90" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#7000FF" text-anchor="middle">Model Layer</text>
    <g transform="translate(20, 100)">
      <rect width="140" height="60" fill="rgba(0,255,102,0.1)" stroke="#00FF66" stroke-width="2" rx="8" filter="url(#glow-green)" />
      <text x="70" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00FF66" text-anchor="middle">XGBoost</text>
    </g>
    <g transform="translate(20, 180)">
      <rect width="140" height="60" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" rx="8" />
      <text x="70" y="35" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">PyTorch MLP</text>
    </g>
    <g transform="translate(20, 260)">
      <rect width="140" height="60" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" rx="8" />
      <text x="70" y="35" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Log. Regression</text>
    </g>
  </g>

  <!-- Step 3: Insight Layer -->
  <g transform="translate(560, 100)">
    <rect width="180" height="400" fill="url(#grad-green)" stroke="#00FF66" stroke-width="1" rx="15" />
    <text x="90" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#00FF66" text-anchor="middle">Insight Layer</text>
    <g transform="translate(20, 100)">
      <rect width="140" height="60" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" rx="8" />
      <text x="70" y="35" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Prob. Score</text>
    </g>
    <g transform="translate(20, 180)">
      <rect width="140" height="60" fill="rgba(112,0,255,0.1)" stroke="#7000FF" rx="8" />
      <text x="70" y="35" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">SHAP Explain.</text>
    </g>
    <g transform="translate(20, 260)">
      <rect width="140" height="60" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" rx="8" />
      <text x="70" y="35" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Risk Segments</text>
    </g>
  </g>

  <!-- Step 4: Action Layer -->
  <g transform="translate(820, 100)">
    <rect width="180" height="400" fill="url(#grad-purple)" stroke="#7000FF" stroke-width="1" rx="15" />
    <text x="90" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#7000FF" text-anchor="middle">Action Layer</text>
    <g transform="translate(20, 140)">
      <rect width="140" height="60" fill="rgba(112,0,255,0.2)" stroke="#7000FF" stroke-width="2" rx="8" />
      <text x="70" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Action Recom.</text>
    </g>
    <g transform="translate(20, 220)">
      <rect width="140" height="60" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" rx="8" />
      <text x="70" y="35" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Strategies</text>
    </g>
  </g>

  <!-- Final Output: Dashboard -->
  <g transform="translate(1040, 250)">
    <rect width="120" height="100" fill="rgba(0,255,102,0.1)" stroke="#00FF66" stroke-width="2" rx="10" filter="url(#glow-green)" />
    <text x="60" y="45" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00FF66" text-anchor="middle">Streamlit</text>
    <text x="60" y="70" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Dashboard</text>
  </g>

  <!-- Legend/Footer -->
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="14" fill="#A0A0A0" text-anchor="middle">Designed for: Customer Churn Prediction &amp; Action System</text>
</svg>
